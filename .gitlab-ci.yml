stages:
  - install
  - validate
  - test
  - build
  - deploy

# ── Versions — update here only ───────────────────────────────────────────────
variables:
  NODE_IMAGE: "node:25-bookworm"
  PNPM_VERSION: "9.15.0"
  PNPM_STORE_DIR: .pnpm-store

# ── Reusable templates ────────────────────────────────────────────────────────
.setup:
  image: $NODE_IMAGE
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential python3
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir $PNPM_STORE_DIR

# Downstream jobs extend this: they pull the pnpm store cache (read-only),
# inherit node_modules from the install artifact, and can be cancelled when a
# newer pipeline supersedes them.
.node-job:
  extends: .setup
  needs: [install]
  interruptible: true
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull

# ── install ───────────────────────────────────────────────────────────────────
# Single install step: warms the pnpm store and runs electron-rebuild once.
# node_modules is passed as an artifact so downstream jobs skip reinstalling.
install:
  extends: .setup
  stage: install
  interruptible: true
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push
  script:
    - pnpm install --frozen-lockfile
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# ── validate ──────────────────────────────────────────────────────────────────
validate:
  extends: .node-job
  stage: validate
  script:
    - pnpm run lint

# ── test ──────────────────────────────────────────────────────────────────────
test:
  extends: .node-job
  stage: test
  script:
    - pnpm run test

# ── build ─────────────────────────────────────────────────────────────────────
build:
  extends: .node-job
  stage: build
  script:
    - pnpm run electron:build
  artifacts:
    paths:
      - dist/
      - dist-electron/
    expire_in: 1 day

# ── deploy ────────────────────────────────────────────────────────────────────
deploy:
  extends: .node-job
  stage: deploy
  needs: [build]
  interruptible: false
  script:
    - echo "Deploy stage — no-op placeholder"
  when: manual
  environment: production
