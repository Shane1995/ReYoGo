name: Pipeline

on:
  push:
    tags: [ 'v*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.0"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts

  validate:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run lint

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run test

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run typecheck

  build:
    needs: [ validate, test, typecheck ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run electron:build

  build-mac:
    name: build:mac
    needs: [ build ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm exec electron-builder install-app-deps
      - name: build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm run build:mac
      - uses: actions/upload-artifact@v7
        with:
          name: dist-mac
          path: release/
          retention-days: 30

  build-win:
    name: build:win
    needs: [ build ]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm exec electron-builder install-app-deps
      - name: build:win
        run: pnpm run build:win
      - uses: actions/upload-artifact@v7
        with:
          name: dist-win
          path: release/
          retention-days: 30

  publish-staging:
    name: Approve staging
    needs: [ build-mac, build-win ]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-mac
          path: artifacts/mac
      - uses: actions/download-artifact@v8
        with:
          name: dist-win
          path: artifacts/win
      - name: Publish pre-release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/mac/*.dmg
            artifacts/mac/*.zip
            artifacts/win/*.exe
            artifacts/win/*.zip

  publish-prod:
    name: Approve production
    needs: [ publish-staging ]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Promote to full release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --prerelease=false \
            --latest
