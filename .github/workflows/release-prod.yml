name: Release Desktop to Production

on:
  push:
    tags:
      - "v*"
      - "!v*-beta.*"

concurrency:
  group: release-prod
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.0"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  build-win:
    runs-on: windows-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter @reyogo/desktop exec electron-builder install-app-deps
      - name: Build desktop
        env:
          PRODUCT_NAME: ReYoGo
          RELEASE_VERSION: ${{ github.ref_name }}
          UPDATE_FEED_URL: ${{ vars.UPDATE_FEED_URL }}/win
          VITE_APP_ENV: production
        run: |
          pnpm --filter @reyogo/desktop run clean
          pnpm --filter @reyogo/desktop run electron:build
          pnpm --filter @reyogo/desktop exec electron-builder --win --publish never --config electron-builder.config.js
      - uses: actions/upload-artifact@v7
        with:
          name: dist-win
          path: packages/desktop/release/
          retention-days: 7

  publish-production:
    name: Upload to production
    needs: [ build-win ]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-win
          path: artifacts/
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2
      - name: Upload to S3 production
        run: |
          TAG="${{ github.ref_name }}"
          aws s3 sync artifacts/ "s3://reyogo-desktop/production/win/${TAG}/" \
            --exclude "win-unpacked/*" \
            --exclude "builder-debug.yml"
          YML=$(find artifacts/ -maxdepth 1 -name "*.yml" ! -name "builder-debug.yml" | head -1)
          sed "s|^path: |path: ${TAG}/|; s|- url: |- url: ${TAG}/|g" "$YML" > /tmp/manifest.yml
          aws s3 cp /tmp/manifest.yml "s3://reyogo-desktop/production/win/$(basename "$YML")"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --generate-notes \
            --title "${{ github.ref_name }}"
