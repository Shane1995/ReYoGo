name: Release Desktop to Staging

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release-staging
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.0"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      beta_tag: ${{ steps.bump.outputs.beta_tag }}
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - id: bump
        name: Bump version and create beta tag
        run: |
          git fetch --tags

          LATEST=$(git tag -l "v[0-9]*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            BASE="0.0.0"
          else
            BASE=$(echo "$LATEST" | sed 's/^v//' | sed 's/-beta\.[0-9]*//')
          fi

          BUMP="${{ inputs.bump }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_BASE="$MAJOR.$MINOR.$PATCH"

          EXISTING=$(git tag -l "v${NEW_BASE}-beta.*" | sort -V | tail -1)
          if [ -z "$EXISTING" ]; then
            BETA_N=1
          else
            LAST_N=$(echo "$EXISTING" | sed 's/.*-beta\.//')
            BETA_N=$((LAST_N + 1))
          fi

          NEW_VERSION="${NEW_BASE}-beta.${BETA_N}"
          BETA_TAG="v${NEW_VERSION}"

          git tag "$BETA_TAG"
          git push origin "$BETA_TAG"

          echo "beta_tag=$BETA_TAG" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  ci:
    needs: version
    uses: ./.github/workflows/ci.yml

  build-win:
    needs: [version, ci]
    runs-on: windows-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.beta_tag }}
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter @reyogo/desktop exec electron-builder install-app-deps
      - name: Build desktop
        env:
          PRODUCT_NAME: ReYoGo Staging
          RELEASE_VERSION: ${{ needs.version.outputs.new_version }}
          UPDATE_FEED_URL: ${{ vars.UPDATE_FEED_URL }}/win
          VITE_APP_ENV: staging
        run: |
          pnpm --filter @reyogo/desktop run clean
          pnpm --filter @reyogo/desktop run electron:build
          pnpm --filter @reyogo/desktop exec electron-builder --win --publish never --config electron-builder.config.js
      - uses: actions/upload-artifact@v7
        with:
          name: dist-win
          path: apps/desktop/release/
          retention-days: 7

  publish-staging:
    name: Upload to staging
    needs: [version, build-win]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist-win
          path: artifacts/
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2
      - name: Upload to S3 staging
        run: |
          TAG="${{ needs.version.outputs.beta_tag }}"
          aws s3 sync artifacts/ "s3://reyogo-desktop/staging/win/${TAG}/" \
            --exclude "win-unpacked/*" \
            --exclude "builder-debug.yml"
          YML=$(find artifacts/ -maxdepth 1 -name "*.yml" ! -name "builder-debug.yml" | head -1)
          sed "s|^path: |path: ${TAG}/|; s|- url: |- url: ${TAG}/|g" "$YML" > /tmp/manifest.yml
          aws s3 cp /tmp/manifest.yml "s3://reyogo-desktop/staging/win/$(basename "$YML")"

  promote:
    name: Approve — promote to production
    needs: [version, publish-staging]
    runs-on: ubuntu-latest
    environment: promote
    permissions:
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create production tag
        run: |
          BETA_TAG="${{ needs.version.outputs.beta_tag }}"
          PROD_VERSION=$(echo "$BETA_TAG" | sed 's/^v//' | sed 's/-beta\.[0-9]*//')
          PROD_TAG="v${PROD_VERSION}"
          git fetch --tags origin
          git tag "$PROD_TAG" "$BETA_TAG"
          git push origin "$PROD_TAG"
